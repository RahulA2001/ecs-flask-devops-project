name: Deploy to ECS (versioned)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional: deploy a specific existing image tag (for rollback). Example: 3a1b2c4"
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Compute image tag
        id: vars
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Login to Amazon ECR (explicit)
        run: |
          REGISTRY=$(echo "${{ secrets.ECR_REPO_URL }}" | cut -d'/' -f1)
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin "$REGISTRY"

      - name: Build Docker image
        run: docker build -t ecs-app .

      - name: Tag Docker image (version + latest)
        run: |
          docker tag ecs-app:latest ${{ secrets.ECR_REPO_URL }}:${{ env.IMAGE_TAG }}
          docker tag ecs-app:latest ${{ secrets.ECR_REPO_URL }}:latest

      - name: Push images to Amazon ECR
        run: |
          docker push ${{ secrets.ECR_REPO_URL }}:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.ECR_REPO_URL }}:latest

      - name: Render Amazon ECS task definition (deploy version tag)
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ecs-task-def.json
          container-name: ecs-lab
          image: ${{ secrets.ECR_REPO_URL }}:${{ env.IMAGE_TAG }}

      - name: Deploy Amazon ECS task definition (rolling)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_NAME }}
          cluster: ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
